{% extends "base.html" %}

{% block title %}Login - Stress Monitor{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-visual" aria-hidden="true">
        <div class="rhythm-stack">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="signal-panel">
            <div class="signal-line high"></div>
            <div class="signal-line mid"></div>
            <div class="signal-line low"></div>
        </div>
    </div>
    <div class="auth-card">
        <p class="eyebrow">Secure session</p>
        <h1>Welcome back</h1>
        <p class="auth-copy">Sign in to continue monitoring live sensor and facial stress signals.</p>
    <form method="post" action="{{ url_for('auth.login_post') }}" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
        </label>

        <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Login</button>
    </form>
    <p class="small-link">Need an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
    </div>
</section>
{% endblock %}
